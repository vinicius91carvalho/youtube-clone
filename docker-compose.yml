services:
  fake-gcs:
    image: fsouza/fake-gcs-server
    ports:
      - "4443:4443"
    # fake-gcs creates a bucket from each subdirectory of /data and preloads their
    # files, so the buckets are defined by the layout under ./data/gcs-data.
    volumes:
      - ./data/gcs-data:/data
    # -filesystem-root persists runtime uploads back to the mounted host dir.
    command: -scheme http -port 4443 -external-url http://localhost:4443 -filesystem-root /data

  video-processor:
    build: ./video-processing-service
    depends_on:
      - fake-gcs
      - firebase-emulator
    environment:
      # Custom var (not STORAGE_EMULATOR_HOST) so storage.ts can pass it as the
      # `apiEndpoint`; the standard var drops the /storage/v1 path and 404s.
      GCS_API_ENDPOINT: http://fake-gcs:4443
      # Reach the Firestore emulator by service name from inside this container.
      FIRESTORE_EMULATOR_HOST: firebase-emulator:8080
    ports:
      - "3001:3000"
    volumes:
      - ./data/video-processing-service/raw-videos:/app/raw-videos
      - ./data/video-processing-service/processed-videos:/app/processed-videos
    
  video-web-client-dev:
    image: node:24
    ports:
      - "3000:3000"
    environment:
      # SSR runs in this container, so it reaches the Functions emulator by its
      # service name instead of localhost (the browser still uses localhost:5001).
      FUNCTIONS_EMULATOR_HOST: firebase-emulator
    volumes:
      - ./video-web-client:/app
      # Keep node_modules and the .next cache container-local; sharing them with
      # the host causes uid/path conflicts and Turbopack cache panics.
      - web-node-modules:/app/node_modules
      - web-next-cache:/app/.next
    working_dir: /app
    command: sh -c "npm install && npm run dev"
  
  firebase-emulator:
    image: andreysenov/firebase-tools:15.21.0
    ports:
      - "4000:4000" # for Firebase emulators UI
      - "4400:4400" # for Emulator Hub API
      - "4500:4500" # for Emulator Suite logging WebSocket (real-time log streaming to UI)
      - "9099:9099" # for Auth emulator
      - "8080:8080" # for Cloud Firestore
      - "5001:5001" # for Cloud Functions
      - "9150:9150" # for Firestore UI WebSocket
    volumes:
      - ./video-web-client:/home/node
      - ./video-api-service:/home/node/api-service
    environment:
      # generateUploadUrl returns this URL to the browser, which uploads to
      # fake-gcs directly — so it must be the host-reachable URL, not the service name.
      GCS_API_ENDPOINT: http://localhost:4443
    command: sh -c "npm --prefix api-service/functions run build && firebase emulators:start"

# Container-local volumes for the web client's node_modules and .next cache.
volumes:
  web-node-modules:
  web-next-cache:
