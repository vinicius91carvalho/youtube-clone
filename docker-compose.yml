services:
  fake-gcs:
    image: fsouza/fake-gcs-server
    ports:
      - "4443:4443"
    # fake-gcs auto-creates a bucket from every subdirectory of /data on startup
    # and preloads the files inside them as objects. So the buckets are defined
    # simply by the folder layout under ./data/gcs-data:
    #   neetcode-youtube-course-raw-videos/        (seeded with the sample video)
    #   neetcode-youtube-course-processed-videos/  (empty — filled at runtime)
    # No init container or bucket-creation script needed.
    volumes:
      - ./data/gcs-data:/data
    # -filesystem-root /data makes the mounted host dir the live storage root so
    # objects uploaded at runtime (the processed videos) persist back to the host
    # under ./data/gcs-data/. Without it, fake-gcs only seeds from /data and writes
    # new objects to its internal /storage dir, which isn't mounted.
    command: -scheme http -port 4443 -external-url http://localhost:4443 -filesystem-root /data

  video-processor:
    build: ./video-processing-service
    depends_on:
      - fake-gcs
    environment:
      # NOT STORAGE_EMULATOR_HOST: @google-cloud/storage reads that variable
      # directly and uses it as the base URL without the /storage/v1 path,
      # which makes every request 404 against fake-gcs. Pass the endpoint via a
      # custom variable that storage.ts forwards as the `apiEndpoint` option.
      GCS_API_ENDPOINT: http://fake-gcs:4443
    ports:
      - "5001:3000"
    volumes:
      - ./data/video-processing-service/raw-videos:/app/raw-videos
      - ./data/video-processing-service/processed-videos:/app/processed-videos
    
  video-web-client-dev:
    image: node:24
    ports:
      - "5000:3000"
    volumes:
      - ./video-web-client:/app
      # Keep node_modules and the Next.js/Turbopack build cache INSIDE the container,
      # shadowing the host copies. The bind mount above shares the source code, but
      # .next and node_modules must NOT be shared with the host: this container runs as
      # root and bakes its own absolute paths (/app/...) into the Turbopack cache, which
      # then collides with host `next dev` runs (different uid + /home/... paths),
      # producing "Permission denied" and broken-path Turbopack panics. Named volumes
      # give the container its own writable, isolated copies.
      - web-node-modules:/app/node_modules
      - web-next-cache:/app/.next
    working_dir: /app
    command: sh -c "npm install && npm run dev"
  
  firebase-emulator:
    image: andreysenov/firebase-tools:15.21.0
    ports:
      - "4000:4000" # for Firebase emulators UI
      - "9099:9099" # for Auth emulator
    volumes:
      - ./video-web-client:/home/node
    command: sh -c "firebase emulators:start --only auth"

# Named volumes that isolate the web client's node_modules and Next.js build cache
# from the host filesystem (see the video-web-client-dev service above).
volumes:
  web-node-modules:
  web-next-cache:
